<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Blade | Wisdom Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background-color:#0C0A07;">
    <div id="root"></div>

    <script type="text/babel" src="living-blade.jsx"></script>

    <script type="text/babel">

        // We use the name of the function inside your .jsx file
        root.render(<LivingBlade />);
